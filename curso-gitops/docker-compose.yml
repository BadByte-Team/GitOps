services:
  api:
    build: .
    ports: ["8080:8080"]
    environment:
      - DB_HOST=mysql-db
      - DB_USER=curso_app
      - DB_PASSWORD=C4rs0_S3cur3_P@ss!
      - DB_NAME=curso_db
      - JWT_SECRET=gk8s_pr0d_s3cr3t_ch4ng3_m3!
    depends_on:
      mysql-db: { condition: service_healthy }
    networks: [db-curso, web-curso]
    restart: unless-stopped

  mysql-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=r00t_S3cur3_P@ss!
      - MYSQL_DATABASE=curso_db
      - MYSQL_USER=curso_app
      - MYSQL_PASSWORD=C4rs0_S3cur3_P@ss!
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [db-curso]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  db-curso: { internal: true }
  web-curso: { driver: bridge }

volumes: { mysql-data: }
