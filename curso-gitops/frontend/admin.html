<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GitOps</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --app-radius: 10px;
            --app-radius-sm: 7px;
            --app-transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color var(--app-transition);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Navbar ── */
        .admin-navbar {
            padding: 0.6rem 0;
            border-bottom: 2px solid rgba(var(--bs-danger-rgb), 0.25);
        }

        .admin-navbar .navbar-brand {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #fff;
        }

        .admin-navbar .brand-dot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.15);
        }

        .admin-navbar .brand-dot i {
            font-size: 0.9rem;
            color: #fff;
        }

        .admin-navbar .btn-sm {
            font-size: 0.78rem;
            font-weight: 500;
            border-radius: var(--app-radius-sm);
            padding: 0.35rem 0.75rem;
        }

        .theme-btn {
            font-size: 1.1rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity var(--app-transition), transform var(--app-transition);
        }

        .theme-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* ── Sidebar Forms ── */
        .form-panel {
            position: sticky;
            top: 1rem;
        }

        .form-card {
            border: 1px solid var(--bs-border-color);
            border-radius: 12px;
            padding: 1.15rem;
            background: var(--bs-body-bg);
        }

        .form-card .form-label-title {
            font-weight: 600;
            font-size: 0.88rem;
            letter-spacing: -0.01em;
            margin-bottom: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .form-card .form-label-title .label-dot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: rgba(var(--bs-success-rgb), 0.1);
        }

        .form-card .form-label-title .label-dot i {
            font-size: 0.72rem;
            color: var(--bs-success);
        }

        .form-card .form-control {
            border-radius: var(--app-radius-sm);
            font-size: 0.84rem;
            padding: 0.5rem 0.75rem;
            transition: border-color var(--app-transition), box-shadow var(--app-transition);
        }

        .form-card .form-control:focus {
            border-color: var(--bs-success);
            box-shadow: 0 0 0 3px rgba(var(--bs-success-rgb), 0.1);
        }

        .form-card .btn {
            border-radius: var(--app-radius-sm);
            font-weight: 600;
            font-size: 0.82rem;
            padding: 0.5rem 1rem;
            transition: transform var(--app-transition);
        }

        .form-card .btn:hover {
            transform: translateY(-1px);
        }

        .form-card .btn:active {
            transform: translateY(0);
        }

        /* ── Section Header ── */
        .section-header {
            padding: 1.5rem 0 0.5rem;
        }

        .section-header h1 {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.03em;
            margin: 0;
        }

        .section-header p {
            font-size: 0.82rem;
            color: var(--bs-secondary-color);
            margin: 0.2rem 0 0;
        }

        /* ── Module Cards ── */
        .admin-card {
            border: 1px solid var(--bs-border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: box-shadow var(--app-transition);
            background: var(--bs-body-bg);
        }

        .admin-card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .admin-card.border-warning {
            border-color: var(--bs-warning) !important;
        }

        .admin-card.border-primary {
            border-color: rgba(var(--bs-primary-rgb), 0.35) !important;
        }

        .admin-card .card-header {
            padding: 0.7rem 1rem;
            border-bottom: 1px solid var(--bs-border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .admin-card .card-header .mod-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .admin-card .card-header .mod-info .mod-id {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            padding: 0 6px;
            border-radius: 6px;
            background: rgba(var(--bs-primary-rgb), 0.1);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--bs-primary);
        }

        .admin-card .card-header .btn-group .btn-sm {
            font-size: 0.72rem;
            padding: 0.28rem 0.55rem;
            border-radius: 6px;
        }

        .admin-card .list-group-item {
            font-size: 0.82rem;
            padding: 0.55rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-color: var(--bs-border-color);
        }

        .admin-card .list-group-item .ep-info {
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }

        .admin-card .list-group-item .ep-info i {
            color: var(--bs-secondary-color);
            font-size: 0.78rem;
        }

        .admin-card .list-group-item .btn-group .btn-sm {
            font-size: 0.7rem;
            padding: 0.22rem 0.5rem;
            border-radius: 5px;
        }

        .admin-card .empty-msg {
            font-size: 0.8rem;
            color: var(--bs-secondary-color);
            font-style: italic;
        }

        .badge {
            font-size: 0.68rem;
            font-weight: 600;
            border-radius: 5px;
            padding: 0.3em 0.55em;
        }

        /* ── Layout ── */
        .main-content {
            flex: 1;
        }

        .site-footer {
            text-align: center;
            padding: 1.25rem 0;
            font-size: 0.72rem;
            letter-spacing: 0.02em;
            color: var(--bs-secondary-color);
            opacity: 0.45;
        }
    </style>
</head>

<body class="bg-body-tertiary">
    <!-- Navbar -->
    <nav class="admin-navbar navbar bg-danger bg-opacity-75 px-3">
        <div class="container-fluid d-flex align-items-center justify-content-between">
            <span class="navbar-brand mb-0">
                <span class="brand-dot"><i class="bi bi-gear-fill"></i></span>
                Panel de Administración
            </span>
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-moon-stars-fill text-white theme-btn" id="theme-icon" onclick="toggleTheme()"></i>
                <a href="/dashboard" class="btn btn-light btn-sm"><i class="bi bi-eye me-1"></i>Vista Alumno</a>
                <button class="btn btn-outline-light btn-sm" onclick="logout()"><i
                        class="bi bi-box-arrow-right me-1"></i>Salir</button>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container-fluid px-4 mt-3 main-content">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 col-md-4">
                <div class="form-panel">
                    <div class="card form-card mb-3 border-0">
                        <div class="form-label-title">
                            <span class="label-dot"><i class="bi bi-plus"></i></span>
                            Nuevo Módulo
                        </div>
                        <input id="m-title" class="form-control mb-2" placeholder="Título del módulo">
                        <button class="btn btn-success w-100" onclick="addM()"><i
                                class="bi bi-check-circle me-1"></i>Crear Módulo</button>
                    </div>
                    <div class="card form-card border-0">
                        <div class="form-label-title">
                            <span class="label-dot"><i class="bi bi-camera-video"></i></span>
                            Nuevo Episodio
                        </div>
                        <input id="e-mod" class="form-control mb-2" placeholder="ID del módulo" type="number">
                        <input id="e-title" class="form-control mb-2" placeholder="Título del episodio">
                        <input id="e-url" class="form-control mb-2" placeholder="URL de YouTube (Embed)">
                        <button class="btn btn-success w-100" onclick="addE()"><i
                                class="bi bi-check-circle me-1"></i>Agregar Episodio</button>
                    </div>
                </div>
            </div>

            <!-- Modules List -->
            <div class="col-lg-9 col-md-8">
                <div class="section-header">
                    <h1><i class="bi bi-kanban me-2"></i>Gestión de Módulos</h1>
                    <p>Administra los módulos y episodios de tu curso</p>
                </div>
                <div id="content"></div>
            </div>
        </div>
    </div>

    <footer class="site-footer">Curso GitOps &copy; 2026</footer>

    <script>
        // XSS Protection
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
        function escapeAttr(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function initTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-bs-theme', theme);
            document.getElementById('theme-icon').className = theme === 'dark' ? 'bi bi-sun-fill text-warning theme-btn' : 'bi bi-moon-stars-fill text-white theme-btn';
        }
        function toggleTheme() {
            const newTheme = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('theme-icon').className = newTheme === 'dark' ? 'bi bi-sun-fill text-warning theme-btn' : 'bi bi-moon-stars-fill text-white theme-btn';
        }
        initTheme();

        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            if (payload.role !== 'admin') window.location.href = '/dashboard';
        } catch (e) { window.location.href = '/'; }

        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        function load() {
            fetch('/api/modules', { headers }).then(r => r.json()).then(data => {
                document.getElementById('content').innerHTML = data.map(m => `
                    <div class="card mb-3 admin-card border-${m.is_hidden ? 'warning' : 'primary'}">
                        <div class="card-header bg-transparent">
                            <div class="mod-info">
                                <span class="mod-id">${m.id}</span>
                                ${escapeHtml(m.title)}
                                ${m.is_hidden ? '<span class="badge bg-warning text-dark ms-2"><i class="bi bi-eye-slash me-1"></i>Oculto</span>' : ''}
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-info" onclick="editM(${m.id}, '${escapeAttr(m.title)}')" title="Editar"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-warning" onclick="req('/api/modules/${m.id}/toggle', 'PUT')" title="Ocultar/Mostrar"><i class="bi bi-eye"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="req('/api/modules/${m.id}', 'DELETE')" title="Eliminar"><i class="bi bi-trash"></i></button>
                            </div>
                        </div>
                        <ul class="list-group list-group-flush">
                            ${m.episodes ? m.episodes.map(e => `
                                <li class="list-group-item">
                                    <span class="ep-info"><i class="bi bi-film"></i> ${escapeHtml(e.title)}</span>
                                    <div class="btn-group">
                                        <button class="btn btn-sm btn-outline-info" onclick="editE(${e.id}, '${escapeAttr(e.title)}', '${escapeAttr(e.video_url)}')"><i class="bi bi-pencil me-1"></i>Editar</button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="req('/api/episodes/${e.id}', 'DELETE')"><i class="bi bi-x-circle me-1"></i>Borrar</button>
                                    </div>
                                </li>
                            `).join('') : '<li class="list-group-item"><span class="empty-msg"><i class="bi bi-inbox me-1"></i>Módulo vacío</span></li>'}
                        </ul>
                    </div>
                `).join('');
            });
        }

        async function req(url, method, body = null) {
            await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });
            load();
        }

        function addM() {
            const title = document.getElementById('m-title').value;
            if (title) { req('/api/modules', 'POST', { title }); document.getElementById('m-title').value = ''; }
        }

        function addE() {
            const modId = parseInt(document.getElementById('e-mod').value);
            const title = document.getElementById('e-title').value;
            const url = document.getElementById('e-url').value;
            if (modId && title && url) {
                req('/api/episodes', 'POST', { module_id: modId, title, video_url: url });
                document.getElementById('e-title').value = ''; document.getElementById('e-url').value = '';
            }
        }

        function editM(id, oldTitle) {
            const newTitle = prompt("Nuevo título del módulo:", oldTitle);
            if (newTitle && newTitle.trim() !== "" && newTitle !== oldTitle) {
                req(`/api/modules/${id}`, 'PUT', { title: newTitle });
            }
        }

        function editE(id, oldTitle, oldUrl) {
            const newTitle = prompt("Nuevo título del episodio:", oldTitle);
            if (!newTitle || newTitle.trim() === "") return;
            const newUrl = prompt("Nueva URL del video:", oldUrl);
            if (!newUrl || newUrl.trim() === "") return;

            if (newTitle !== oldTitle || newUrl !== oldUrl) {
                req(`/api/episodes/${id}`, 'PUT', { title: newTitle, video_url: newUrl });
            }
        }

        function logout() { localStorage.removeItem('token'); window.location.href = '/'; }

        load();
    </script>
</body>

</html>
