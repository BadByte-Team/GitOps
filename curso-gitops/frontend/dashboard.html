<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Curso GitOps</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --app-radius: 10px;
            --app-radius-sm: 7px;
            --app-transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color var(--app-transition);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Navbar ── */
        .app-navbar {
            padding: 0.65rem 0;
            border-bottom: 1px solid var(--bs-border-color);
            backdrop-filter: blur(8px);
        }

        .app-navbar .navbar-brand {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .app-navbar .brand-dot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(var(--bs-primary-rgb), 0.12);
        }

        .app-navbar .brand-dot i {
            font-size: 0.95rem;
            color: var(--bs-primary);
        }

        .app-navbar .btn-sm {
            font-size: 0.78rem;
            font-weight: 500;
            border-radius: var(--app-radius-sm);
            padding: 0.35rem 0.75rem;
        }

        .theme-btn {
            font-size: 1.1rem;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity var(--app-transition), transform var(--app-transition);
        }

        .theme-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* ── Page Header ── */
        .page-header {
            padding: 2rem 0 0.25rem;
        }

        .page-header h1 {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.03em;
            margin: 0;
        }

        .page-header p {
            font-size: 0.85rem;
            color: var(--bs-secondary-color);
            margin: 0.25rem 0 0;
        }

        /* ── Module Cards ── */
        .module-card {
            border: 1px solid var(--bs-border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: transform var(--app-transition), box-shadow var(--app-transition);
            background: var(--bs-body-bg);
        }

        .module-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .module-card .card-header {
            border-bottom: 1px solid var(--bs-border-color);
            padding: 0.85rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .module-card .card-header .mod-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(var(--bs-primary-rgb), 0.1);
            flex-shrink: 0;
        }

        .module-card .card-header .mod-icon i {
            font-size: 0.9rem;
            color: var(--bs-primary);
        }

        .module-card .card-header .mod-title {
            font-weight: 600;
            font-size: 0.92rem;
            letter-spacing: -0.01em;
        }

        .module-card .list-group-item {
            font-size: 0.85rem;
            padding: 0.65rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-color: var(--bs-border-color);
            transition: background-color var(--app-transition);
        }

        .module-card .list-group-item:hover {
            background-color: rgba(var(--bs-primary-rgb), 0.04);
        }

        .module-card .list-group-item .ep-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--bs-body-color);
        }

        .module-card .list-group-item .ep-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: rgba(var(--bs-primary-rgb), 0.08);
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--bs-primary);
            flex-shrink: 0;
        }

        .module-card .btn-watch {
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 6px;
            padding: 0.3rem 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: transform var(--app-transition);
        }

        .module-card .btn-watch:hover {
            transform: translateX(2px);
        }

        .module-card .empty-ep {
            font-size: 0.82rem;
            color: var(--bs-secondary-color);
            font-style: italic;
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--bs-secondary-color);
        }

        .empty-state i {
            font-size: 3rem;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 0.9rem;
            margin-top: 0.75rem;
        }

        /* ── Layout ── */
        .main-content {
            flex: 1;
        }

        .site-footer {
            text-align: center;
            padding: 1.25rem 0;
            font-size: 0.72rem;
            letter-spacing: 0.02em;
            color: var(--bs-secondary-color);
            opacity: 0.45;
        }
    </style>
</head>

<body class="bg-body-tertiary">
    <!-- Navbar -->
    <nav class="app-navbar bg-body-secondary">
        <div class="container d-flex align-items-center justify-content-between">
            <span class="navbar-brand mb-0">
                <span class="brand-dot"><i class="bi bi-journal-code"></i></span>
                Plataforma GitOps
            </span>
            <div class="d-flex align-items-center gap-2" id="nav-actions">
                <i class="bi bi-moon-stars-fill theme-btn" id="theme-icon" onclick="toggleTheme()"></i>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </button>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container main-content">
        <div class="page-header">
            <h1><i class="bi bi-collection-play me-2"></i>Módulos del Curso</h1>
            <p>Selecciona un módulo para comenzar a estudiar</p>
        </div>
        <div class="row mt-3" id="modules-container"></div>
    </div>

    <footer class="site-footer">Curso GitOps &copy; 2026</footer>

    <script>
        // XSS Protection
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function initTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-bs-theme', theme);
            document.getElementById('theme-icon').className = theme === 'dark' ? 'bi bi-sun-fill text-warning theme-btn' : 'bi bi-moon-stars-fill theme-btn';
        }
        function toggleTheme() {
            const newTheme = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('theme-icon').className = newTheme === 'dark' ? 'bi bi-sun-fill text-warning theme-btn' : 'bi bi-moon-stars-fill theme-btn';
        }
        initTheme();

        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            if (payload.role === 'admin') {
                const navActions = document.getElementById('nav-actions');
                navActions.insertAdjacentHTML('afterbegin', '<a href="/admin" class="btn btn-warning btn-sm"><i class="bi bi-gear-fill me-1"></i>Admin</a>');
            }
        } catch (e) { console.error("Token inválido"); }

        async function loadModules() {
            const res = await fetch('/api/modules', { headers: { 'Authorization': 'Bearer ' + token } });
            if (res.status === 401) { logout(); return; }

            const modules = await res.json();
            const container = document.getElementById('modules-container');
            container.innerHTML = '';

            if (!modules || modules.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox d-block"></i><p>Aún no hay módulos disponibles</p></div>';
                return;
            }

            modules.forEach((mod, mi) => {
                let eps = mod.episodes ? mod.episodes.map((ep, ei) => `
                    <li class="list-group-item">
                        <span class="ep-title">
                            <span class="ep-num">${ei + 1}</span>
                            ${escapeHtml(ep.title)}
                        </span>
                        <a href="${escapeHtml(ep.video_url)}" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-watch">
                            <i class="bi bi-play-fill"></i> Ver
                        </a>
                    </li>
                `).join('') : '<li class="list-group-item"><span class="empty-ep"><i class="bi bi-hourglass-split me-1"></i>Próximamente...</span></li>';

                container.innerHTML += `
                    <div class="col-md-6 mb-4">
                        <div class="card module-card h-100 border-0">
                            <div class="card-header bg-transparent">
                                <span class="mod-icon"><i class="bi bi-folder2-open"></i></span>
                                <span class="mod-title">${escapeHtml(mod.title)}</span>
                            </div>
                            <ul class="list-group list-group-flush">${eps}</ul>
                        </div>
                    </div>`;
            });
        }

        function logout() { localStorage.removeItem('token'); window.location.href = '/'; }
        loadModules();
    </script>
</body>

</html>
